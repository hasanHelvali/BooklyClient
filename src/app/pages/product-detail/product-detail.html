<section class="padding-large">
  <div class="container">
    @if (product) {
      <div class="row g-5">
        <div class="col-md-5">
          <img
            [src]="product.imageUrl || 'images/product-item1.png'"
            class="img-fluid rounded-3 shadow-sm"
            alt="product image"
          />
        </div>
        <div class="col-md-7">
          <span class="badge bg-secondary mb-2">{{ product.categoryName }}</span>
          <h2 class="fw-bold mb-1">{{ product.name }}</h2>
          <p class="text-muted fs-5 mb-3">{{ product.author }}</p>
          <h3 class="text-primary fw-bold mb-3">{{ product.price | currency: '₺' }}</h3>
          <p class="mb-1 text-muted">Stok: {{ product.stock }}</p>
          <button
            class="btn btn-dark btn-lg mt-4"
            (click)="cartService.addToCart(product)"
            [disabled]="product.stock === 0"
          >
            <svg style="width: 18px; height: 18px" class="me-2">
              <use xlink:href="#cart"></use>
            </svg>
            {{ product.stock === 0 ? 'Stok Yok' : 'Sepete Ekle' }}
          </button>
        </div>
      </div>
    } @else {
      <p class="text-muted">Ürün yükleniyor...</p>
    }
  </div>
</section>
