<section id="categories" class="padding-large pt-0">
  <div class="container">
    <div class="section-title overflow-hidden mb-4">
      <h3 class="d-flex align-items-center">Kategoriler</h3>
    </div>
    <div class="row">
      @for (category of categories; track category.id) {
        <div class="col-md-4">
          <div class="card mb-4 border-0 rounded-3 position-relative">
            <img src="images/category1.jpg" class="img-fluid rounded-3" alt="category" />
            <h6 class="position-absolute bottom-0 bg-primary m-4 py-2 px-3 rounded-3">
              <a class="text-white text-decoration-none"
                 (click)="scrollToProducts()"
                 style="cursor:pointer">{{ category.name }}</a>
            </h6>
          </div>
        </div>
      }
    </div>
  </div>
</section>
