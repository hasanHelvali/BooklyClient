<section id="best-selling-items" class="position-relative padding-large">
  <div class="container">
    <div class="section-title d-md-flex justify-content-between align-items-center mb-4">
      <h3 class="d-flex align-items-center">Best selling items</h3>
      <a href="index.html" class="btn">View All</a>
    </div>
    <div
      class="position-absolute top-50 end-0 pe-0 pe-xxl-5 me-0 me-xxl-5 swiper-next product-slider-button-next"
    >
      <svg
        class="chevron-forward-circle d-flex justify-content-center align-items-center p-2"
        width="80"
        height="80"
      >
        <use xlink:href="#alt-arrow-right-outline"></use>
      </svg>
    </div>
    <div
      class="position-absolute top-50 start-0 ps-0 ps-xxl-5 ms-0 ms-xxl-5 swiper-prev product-slider-button-prev"
    >
      <svg
        class="chevron-back-circle d-flex justify-content-center align-items-center p-2"
        width="80"
        height="80"
      >
        <use xlink:href="#alt-arrow-left-outline"></use>
      </svg>
    </div>
    <div class="swiper product-swiper">
      <div class="swiper-wrapper">
        <div class="swiper-slide" *ngFor="let product of products">
          <div class="card position-relative p-4 border rounded-3">
            <img
              [src]="product.imageUrl || 'images/product-item1.png'"
              class="img-fluid shadow-sm"
              alt="product item"
            />
            <h6 class="mt-4 mb-0 fw-bold">{{ product.name }}</h6>
            <div class="review-content d-flex">
              <p class="my-2 me-2 fs-6 text-black-50">{{ product.author }}</p>
            </div>
            <span class="price text-primary fw-bold mb-2 fs-5">
              {{ product.price | currency: '₺' }}
            </span>
            <div class="card-concern position-absolute start-0 end-0 d-flex gap-2">
              <button
                type="button"
                class="btn btn-dark"
                (click)="cartService.addToCart(product)"
                [disabled]="product.stock === 0"
              >
                <svg class="cart">
                  <use xlink:href="#cart"></use>
                </svg>
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
