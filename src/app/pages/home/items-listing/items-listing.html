<section id="items-listing" class="padding-large">
  <div class="container">
    <div class="section-title d-md-flex justify-content-between align-items-center mb-4">
      <h3 class="d-flex align-items-center">Tüm Kitaplar</h3>
    </div>

    <!-- Kategori Filtreleri -->
    <div class="d-flex flex-wrap gap-2 mb-4">
      <button
        class="btn btn-sm"
        [class.btn-dark]="selectedCategoryId === null"
        [class.btn-outline-dark]="selectedCategoryId !== null"
        (click)="filterByCategory(null)"
      >
        Tümü
      </button>
      @for (category of categories; track category.id) {
        <button
          class="btn btn-sm"
          [class.btn-dark]="selectedCategoryId === category.id"
          [class.btn-outline-dark]="selectedCategoryId !== category.id"
          (click)="filterByCategory(category.id)"
        >
          {{ category.name }}
        </button>
      }
    </div>

    <div class="row g-4">
      @for (product of products; track product.id) {
        <div class="col-md-6 col-lg-3">
          <div class="card position-relative p-4 border rounded-3 h-100 d-flex flex-column">
            <img
              [src]="product.imageUrl || 'images/product-item1.png'"
              class="img-fluid shadow-sm"
              alt="product item"
            />
            <h6 class="mt-4 mb-0 fw-bold">
              <a [routerLink]="['/products', product.id]" class="text-dark text-decoration-none">{{ product.name }}</a>
            </h6>
            <p class="my-2 fs-6 text-black-50">{{ product.author }}</p>
            <span class="price text-primary fw-bold mb-3 fs-5">
              {{ product.price | currency: '₺' }}
            </span>
            <button
              class="btn btn-dark mt-auto"
              (click)="cartService.addToCart(product)"
              [disabled]="product.stock === 0"
            >
              <svg style="width: 16px; height: 16px" class="me-1">
                <use xlink:href="#cart"></use>
              </svg>
              {{ product.stock === 0 ? 'Stok Yok' : 'Sepete Ekle' }}
            </button>
            <small class="text-muted mt-2">Stok: {{ product.stock }}</small>
          </div>
        </div>
      }
    </div>

  </div>
</section>
