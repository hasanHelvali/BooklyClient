<div class="p-4">
  <div class="d-flex align-items-center gap-2 mb-4">
    <p-button icon="pi pi-arrow-left" severity="secondary" routerLink="/admin/categories" />
    <h2 class="mb-0">Yeni Kategori</h2>
  </div>

  <div class="card p-4" style="max-width: 500px">
    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="field mb-3">
        <label for="name">Kategori Adı</label>
        <input pInputText id="name" formControlName="name" class="w-100" />
        @if (form.get('name')?.invalid && form.get('name')?.touched) {
          <small class="text-danger">Kategori adı zorunludur.</small>
        }
      </div>

      <div class="d-flex gap-2">
        <p-button label="Kaydet" type="submit" [disabled]="form.invalid" />
        <p-button label="İptal" severity="secondary" routerLink="/admin/categories" />
      </div>
    </form>
  </div>
</div>
