<p-toast position="top-right" />
<div class="container py-4" style="max-width: 600px">
  <div class="d-flex align-items-center gap-3 mb-4">
    <p-button icon="pi pi-arrow-left" severity="secondary" routerLink="/admin/products" />
    <h4 class="fw-bold mb-0">{{ isEditMode ? 'Ürün Düzenle' : 'Yeni Ürün Ekle' }}</h4>
  </div>

  <div class="card p-4 shadow-sm">
    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="d-flex flex-column gap-3">
      <div class="d-flex flex-column gap-1">
        <label class="fw-semibold">Kitap Adı</label>
        <input pInputText formControlName="name" class="w-100" />
      </div>
      <div class="d-flex flex-column gap-1">
        <label class="fw-semibold">Yazar</label>
        <input pInputText formControlName="author" class="w-100" />
      </div>
      <div class="d-flex flex-column gap-1">
        <label class="fw-semibold">Fiyat</label>
        <p-inputnumber
          [formControl]="form.controls.price"
          mode="currency"
          currency="TRY"
          styleClass="w-100"
        />
      </div>
      <div class="d-flex flex-column gap-1">
        <label class="fw-semibold">Stok</label>
        <p-inputnumber [formControl]="form.controls.stock" styleClass="w-100" />
      </div>
      <div class="d-flex flex-column gap-1">
        <label class="fw-semibold">Kategori</label>
        <p-select
          [options]="categories"
          optionLabel="name"
          optionValue="id"
          formControlName="categoryId"
          placeholder="Kategori Seçin"
        />
      </div>
      <div class="d-flex flex-column gap-1">
        <label class="fw-semibold">Görsel</label>
        <input type="file" accept="image/*" class="form-control" (change)="onFileSelected($event)" />
        @if (isUploading) {
          <small class="text-muted">Yükleniyor...</small>
        }
        @if (imageUrl) {
          <img [src]="imageUrl" style="max-height: 120px; object-fit: contain;" class="mt-2 rounded" />
        }
      </div>
      <div class="d-flex justify-content-end mt-2">
        <p-button type="submit" label="Kaydet" icon="pi pi-check" [disabled]="form.invalid || isUploading" />
      </div>
    </form>
  </div>
</div>
