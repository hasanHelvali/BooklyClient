<div class="p-4">
  <div class="d-flex align-items-center gap-3 mb-4">
    <p-button icon="pi pi-arrow-left" severity="secondary" routerLink="/admin/products" />
    <h2 class="fw-bold">{{ isEditMode ? 'Ürün Düzenle' : 'Yeni Ürün Ekle' }}</h2>
  </div>

  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="d-flex flex-column gap-3">
    <div class="d-flex flex-column gap-1">
      <label>Kitap Adı</label>
      <input pInputText formControlName="name" />
    </div>
    <div class="d-flex flex-column gap-1">
      <label>Yazar</label>
      <input pInputText formControlName="author" />
    </div>
    <div class="d-flex flex-column gap-1">
      <label>Fiyat</label>
      <p-inputnumber formControlName="price" mode="currency" currency="USD" />
    </div>
    <div class="d-flex flex-column gap-1">
      <label>Stok</label>
      <p-inputnumber formControlName="stock" />
    </div>
    <div class="d-flex flex-column gap-1">
      <label>Kategori</label>
      <p-select [options]="categories" formControlName="category" placeholder="Kategori seç" />
    </div>
    <p-button type="submit" label="Kaydet" [disabled]="form.invalid" />
  </form>
</div>
