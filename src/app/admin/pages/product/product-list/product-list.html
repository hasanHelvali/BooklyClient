<div class="p-4">
  <div class="flex justify-between items-center mb-4">
    <h2 class="text-2xl font-bold">Ürünler</h2>
    <p-button label="Yeni Ürün Ekle" icon="pi pi-plus" routerLink="/admin/products/add" />
  </div>

  <p-table [value]="products" [paginator]="true" [rows]="10" stripedRows>
    <ng-template #header>
      <tr>
        <th>Ad</th>
        <th>Yazar</th>
        <th>Fiyat</th>
        <th>Stok</th>
        <th>Kategori</th>
        <th>İşlem</th>
      </tr>
    </ng-template>
    <ng-template #body let-product>
      <tr>
        <td>{{ product.name }}</td>
        <td>{{ product.author }}</td>
        <td>{{ product.price | currency: '₺' }}</td>
        <td>{{ product.stock }}</td>
        <td>{{ product.category }}</td>
        <td>
          <p-button
            icon="pi pi-pencil"
            [routerLink]="['/admin/products/edit', product.id]"
            severity="secondary"
            class="mr-2"
          />
          <p-button icon="pi pi-trash" severity="danger" />
        </td>
      </tr>
    </ng-template>
  </p-table>
</div>
