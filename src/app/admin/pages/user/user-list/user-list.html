<div class="p-4">
  <p-toast position="top-right" />

  <div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="m-0">Kullanıcılar</h4>
  </div>

  <p-table [value]="users" stripedRows>
    <ng-template #header>
      <tr>
        <th style="width: 25%">Ad</th>
        <th style="width: 25%">Soyad</th>
        <th style="width: 30%">E-posta</th>
        <th style="width: 20%">Rol</th>
      </tr>
    </ng-template>
    <ng-template #body let-user>
      <tr>
        <td>{{ user.firstName }}</td>
        <td>{{ user.lastName }}</td>
        <td>{{ user.email }}</td>
        <td>
          <p-select
            [options]="roles"
            [(ngModel)]="user.role"
            (onChange)="onRoleChange(user, user.role)"
          />
        </td>
      </tr>
    </ng-template>
  </p-table>
</div>
