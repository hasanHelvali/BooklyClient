<div class="d-flex" style="height: 100vh">
  <aside class="d-flex flex-column bg-dark text-white" style="width: 250px; flex-shrink: 0">
    <div class="p-3 fs-5 fw-bold border-bottom border-secondary">Bookly Admin</div>
    <p-menu [model]="menuItems" styleClass="w-100 border-0 bg-transparent" />

    <div class="mt-auto p-3">
      <div class="mt-auto p-3">
        <p-button
          label="Siteye Dön"
          icon="pi pi-home"
          severity="secondary"
          routerLink="/"
          styleClass="w-100 mb-2"
        />
        <p-button
          label="Çıkış Yap"
          icon="pi pi-sign-out"
          severity="danger"
          (click)="logout()"
          styleClass="w-100"
        />
      </div>
    </div>
  </aside>
  <main class="flex-grow-1 overflow-auto bg-light">
    <router-outlet />
  </main>
</div>
